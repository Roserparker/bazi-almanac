<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>化机历 · 八字流日万年历</title>
    <meta
      name="description"
      content="万年历 + 八字流日：输入生辰，浏览器本地排盘，看每天的流日如何与你的本命盘发生能量化学反应。点开每个术语都能学，福祸相依、顺势而为。数据不出本机。"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23f1e7d6'/%3E%3Ctext x='32' y='44' font-size='36' text-anchor='middle' font-family='serif' fill='%23b08a2c'%3E化%3C/text%3E%3C/svg%3E" />
  </head>
  <body>
    <div class="page">
      <header class="masthead">
        <div class="brand">化机历</div>
        <div class="sub">每日顺逆 · 八字流日 · 万年历</div>
      </header>

      <nav class="topnav">
        <a href="#dashboard">今日</a><a href="#almanac">万年历</a><a href="#personal">命盘</a><a href="#ziwei">紫微</a><a href="#btc">观象</a><a href="#learn">学堂</a><a href="#yixue">易学</a>
      </nav>

      <!-- 今日仪表盘（首屏） -->
      <section id="dashboard" class="card dash"></section>

      <!-- 万年历（带顺逆点） -->
      <section id="almanac" class="card"></section>

      <!-- 个人化：选定日详解 + 本命盘（录入后出现） -->
      <main id="personal"></main>

      <!-- 紫微斗数 · 个人星盘（辅助板块） -->
      <section id="ziwei" class="card"></section>

      <!-- 观象台 · BTC（创世八字 × 流年月日 + 六爻 + 奇门） -->
      <section id="btc" class="card"></section>

      <!-- 录入生辰 -->
      <section id="intake" class="card">
        <h2 class="sect-title">录入生辰 · 解锁你的化学反应</h2>
        <form id="birth-form" class="birth-form" autocomplete="off">
          <div class="form-grid">
            <div class="field">
              <label for="f-date">出生日期（公历）</label>
              <input type="date" id="f-date" required min="1901-01-01" max="2099-12-31" />
            </div>
            <div class="field">
              <label for="f-time">出生时间</label>
              <input type="time" id="f-time" value="12:00" required />
            </div>
            <div class="field">
              <label>性别</label>
              <div class="radio-row">
                <label><input type="radio" name="gender" value="1" checked /> 男</label>
                <label><input type="radio" name="gender" value="0" /> 女</label>
              </div>
            </div>
          </div>
          <button type="submit" class="btn">排 盘</button>
          <span class="hint">时间不确定可留 12:00，仅影响时柱</span>
        </form>
        <div id="intake-summary" hidden></div>
        <p class="privacy">· 生辰仅存于本机浏览器，不上传、不联网、可随时清除 ·</p>
      </section>

      <!-- 教学 -->
      <section id="learn" class="card"></section>

      <!-- 易学 · 八卦五行 -->
      <section id="yixue" class="card"></section>

      <footer class="footer">
        <div class="foot-note">
          化机历 · 以《滴天髓》《三命通会》为底、以《道德经》为怀的传统模型现代化表达。<br />
          描述能量倾向，仅供参考、不作宿命论断 —— 福祸相依，顺势而为。
        </div>
      </footer>
    </div>

    <!-- 术语讲解浮层 -->
    <div id="pop" class="pop" hidden></div>
    <!-- 关系连线悬停浮层 -->
    <div id="tip" class="tip" hidden></div>

    <script src="vendor/lunar.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/interpret.js"></script>
    <script src="js/knowledge.js"></script>
    <script src="js/analyze.js"></script>
    <script src="js/ziwei.js"></script>
    <script src="js/liuyao.js"></script>
    <script src="js/qimen.js"></script>
    <script src="js/daily.js"></script>
    <script src="js/btc.js"></script>
    <script src="js/ui/format.js"></script>
    <script src="js/ui/popups.js"></script>
    <script src="js/ui/almanac.js"></script>
    <script src="js/ui/dashboard.js"></script>
    <script src="js/ui/personal.js"></script>
    <script src="js/ui/learn.js"></script>
    <script src="js/ui/ziwei.js"></script>
    <script src="js/ui/btc.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
